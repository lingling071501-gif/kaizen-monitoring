<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaizen Monitor – CY2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Segoe UI, sans-serif;
    background: #f7f8fa;
    color: #111;
    padding: 24px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .title-group h1 { font-size: 22px; font-weight: 600; color: #0a3d62; }
  .title-group p  { font-size: 13px; color: #666; margin-top: 3px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    font-size: 13px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    color: #333;
    transition: background .15s;
  }
  .btn:hover { background: #f0f4f8; }
  .btn-row { display: flex; gap: 8px; }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .kpi {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .kpi-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .kpi-val   { font-size: 24px; font-weight: 600; color: #111; }
  .kpi-sub   { font-size: 11px; color: #9ca3af; margin-top: 2px; }

  /* ── Table Card ── */
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow-x: auto;
    margin-bottom: 1.5rem;
  }

  .tbl { width: 100%; border-collapse: collapse; min-width: 780px; }

  .tbl thead tr th {
    background: #0a3d62;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 10px 12px;
    text-align: center;
    white-space: nowrap;
  }
  .tbl thead tr th:first-child { text-align: left; border-radius: 12px 0 0 0; }
  .tbl thead tr th:last-child  { border-radius: 0 12px 0 0; }

  .tbl tbody tr { border-bottom: 1px solid #f3f4f6; }
  .tbl tbody tr:last-child { border-bottom: none; }
  .tbl tbody td { padding: 10px 12px; vertical-align: middle; text-align: center; }
  .tbl tbody td:first-child { text-align: left; }

  /* Section name editable */
  .section-name-wrap { display: flex; align-items: center; gap: 6px; }
  .section-name-wrap input[type=text] {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    border: none;
    background: transparent;
    width: 110px;
    padding: 3px 5px;
    border-radius: 5px;
    outline: none;
  }
  .section-name-wrap input[type=text]:focus {
    background: #f0f4f8;
    border: 1px solid #cbd5e1;
  }

  /* Target badge */
  .target-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #f0f4f8;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 13px;
    font-weight: 600;
    color: #0a3d62;
  }
  .target-badge input[type=number] {
    width: 36px;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #0a3d62;
    outline: none;
    -moz-appearance: textfield;
  }
  .target-badge input::-webkit-inner-spin-button { display: none; }

  /* Month cell */
  .month-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .month-cell input[type=number] {
    width: 54px;
    padding: 5px 4px;
    text-align: center;
    border: 1px solid #e2e8f0;
    border-radius: 7px;
    background: #fff;
    font-size: 13px;
    outline: none;
    -moz-appearance: textfield;
    transition: border .15s;
  }
  .month-cell input[type=number]:focus { border-color: #0a3d62; }
  .month-cell input::-webkit-inner-spin-button { display: none; }

  /* Variance tags */
  .var-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    min-width: 28px;
    display: inline-block;
    text-align: center;
  }
  .var-good { color: #15803d; background: #dcfce7; }
  .var-bad  { color: #dc2626; background: #fee2e2; }
  .var-zero { color: #6b7280; background: #f3f4f6; }

  /* Total block */
  .total-val { font-size: 15px; font-weight: 600; color: #111; }
  .prog {
    height: 5px;
    background: #f3f4f6;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 5px;
    width: 70px;
    margin-left: auto;
    margin-right: auto;
  }
  .prog-fill { height: 100%; border-radius: 20px; transition: width .3s; }
  .prog-green  { background: #16a34a; }
  .prog-amber  { background: #f59e0b; }
  .prog-red    { background: #dc2626; }

  /* Status pills */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill-ok   { background: #dcfce7; color: #15803d; }
  .pill-warn { background: #fef9c3; color: #92400e; }
  .pill-crit { background: #fee2e2; color: #dc2626; }

  /* Remove row btn */
  .rm-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s;
  }
  .rm-btn:hover { color: #dc2626; }

  /* ── Summary ── */
  .summary-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-left: 5px solid #dc2626;
    border-radius: 12px;
    padding: 16px 20px;
  }
  .summary-card h2 {
    font-size: 15px;
    font-weight: 600;
    color: #0a3d62;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .summary-item {
    padding: 9px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 13px;
    color: #4b5563;
    line-height: 1.6;
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item strong { color: #111; }
  .all-ok {
    font-size: 14px;
    color: #16a34a;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="title-group">
    <h1>&#9650; Kaizen Monitor &ndash; CY2026</h1>
    <p>Track monthly kaizen activities vs section targets &mdash; editable, live updating</p>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="addRow()">&#43; Add section</button>
    <button class="btn" onclick="exportCSV()">&#8595; Export CSV</button>
  </div>
</div>

<!-- KPI cards -->
<div class="kpi-grid" id="kpiGrid"></div>

<!-- Table -->
<div class="card">
  <table class="tbl">
    <thead>
      <tr>
        <th>Section</th>
        <th>Target / mo</th>
        <th>Jan</th>
        <th>Feb</th>
        <th>Mar</th>
        <th>Apr</th>
        <th>May</th>
        <th>Total</th>
        <th>Variance</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="rowsContainer"></tbody>
  </table>
</div>

<!-- Backlog Summary -->
<div class="summary-card">
  <h2>🚨 Backlog summary</h2>
  <div id="summaryBox"></div>
</div>

<script>
const MONTHS      = ["Jan","Feb","Mar","Apr","May"];
const MONTH_FULL  = ["January","February","March","April","May"];
const COLORS      = ["#1d6fba","#16a34a","#d97706","#7c3aed","#dc2626","#0891b2","#be185d","#065f46"];

let rows = [
  { name:"Assembly", target:12, vals:[14,14,8,16,7] },
  { name:"Machine",  target:4,  vals:[3,2,3,4,2]   },
  { name:"LM",       target:4,  vals:[0,0,5,2,7]   }
];

/* ── Build table rows ── */
function buildRows() {
  const tbody = document.getElementById("rowsContainer");
  tbody.innerHTML = "";

  rows.forEach((row, ri) => {
    const tr = document.createElement("tr");

    // Section name cell
    const tdName = document.createElement("td");
    tdName.innerHTML = `
      <div class="section-name-wrap">
        <input type="text" value="${row.name}"
          onchange="rows[${ri}].name=this.value; refresh()"
          aria-label="Section name">
        <button class="rm-btn" onclick="removeRow(${ri})" title="Remove section">&#215;</button>
      </div>`;
    tr.appendChild(tdName);

    // Target cell
    const tdTarget = document.createElement("td");
    tdTarget.innerHTML = `
      <div class="target-badge">
        <input type="number" value="${row.target}" min="1"
          onchange="rows[${ri}].target=Math.max(1,Number(this.value)||1); refresh()"
          aria-label="Monthly target">
      </div>`;
    tr.appendChild(tdTarget);

    // Month cells
    MONTHS.forEach((m, mi) => {
      const td = document.createElement("td");
      td.innerHTML = `
        <div class="month-cell">
          <input type="number" value="${row.vals[mi]}" min="0"
            onchange="rows[${ri}].vals[${mi}]=Math.max(0,Number(this.value)||0); refresh()"
            aria-label="${m} actual">
          <span class="var-tag" id="vt-${ri}-${mi}"></span>
        </div>`;
      tr.appendChild(td);
    });

    // Total cell
    const tdTot = document.createElement("td");
    tdTot.id = `tot-${ri}`;
    tr.appendChild(tdTot);

    // Variance cell
    const tdVar = document.createElement("td");
    tdVar.id = `tv-${ri}`;
    tr.appendChild(tdVar);

    // Status cell
    const tdSt = document.createElement("td");
    tdSt.id = `st-${ri}`;
    tr.appendChild(tdSt);

    tbody.appendChild(tr);
  });
}

/* ── Refresh calculations ── */
function refresh() {
  let grandTotal  = 0;
  let grandTarget = 0;

  rows.forEach((row, ri) => {
    const total       = row.vals.reduce((a,b)=>a+b, 0);
    const targetTotal = row.target * MONTHS.length;
    const variance    = total - targetTotal;
    const pct         = Math.round(total / targetTotal * 100);
    grandTotal  += total;
    grandTarget += targetTotal;

    let lacking = [];

    // Per-month variance tags
    row.vals.forEach((v, mi) => {
      const vv  = v - row.target;
      const el  = document.getElementById(`vt-${ri}-${mi}`);
      if (el) {
        el.textContent = vv >= 0 ? `+${vv}` : `${vv}`;
        el.className   = `var-tag ${vv > 0 ? "var-good" : vv < 0 ? "var-bad" : "var-zero"}`;
      }
      if (vv < 0) lacking.push(`${MONTH_FULL[mi]} (${Math.abs(vv)})`);
    });

    // Total block
    const totEl = document.getElementById(`tot-${ri}`);
    if (totEl) {
      const cls = pct >= 100 ? "prog-green" : pct >= 80 ? "prog-amber" : "prog-red";
      totEl.innerHTML = `
        <div class="total-val">${total} / ${targetTotal}</div>
        <div class="prog"><div class="prog-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>`;
    }

    // Variance total
    const tvEl = document.getElementById(`tv-${ri}`);
    if (tvEl) {
      const color = variance >= 0 ? "#16a34a" : "#dc2626";
      tvEl.innerHTML = `<span style="color:${color};font-weight:600">${variance>=0?"+":""}${variance}</span>`;
    }

    // Status pill with emoji
    const stEl = document.getElementById(`st-${ri}`);
    if (stEl) {
      if (pct >= 100) {
        stEl.innerHTML = `<span class="status-pill pill-ok">✅ On track</span>`;
      } else if (pct >= 80) {
        stEl.innerHTML = `<span class="status-pill pill-warn">⚠️ Warning</span>`;
      } else {
        stEl.innerHTML = `<span class="status-pill pill-crit">🚨 Lacking ${Math.abs(variance)}</span>`;
      }
    }
  });

  // KPI cards
  const overallPct = Math.round(grandTotal / grandTarget * 100);
  const onTrack    = rows.filter(r => r.vals.reduce((a,b)=>a+b,0) >= r.target * MONTHS.length).length;
  const kpiColor   = overallPct >= 100 ? "#16a34a" : overallPct >= 80 ? "#d97706" : "#dc2626";
  document.getElementById("kpiGrid").innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total kaizen</div>
      <div class="kpi-val">${grandTotal}</div>
      <div class="kpi-sub">of ${grandTarget} target</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Overall attainment</div>
      <div class="kpi-val" style="color:${kpiColor}">${overallPct}%</div>
      <div class="kpi-sub">across all sections</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Sections on track</div>
      <div class="kpi-val">${onTrack} / ${rows.length}</div>
      <div class="kpi-sub">at or above target</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Sections tracked</div>
      <div class="kpi-val">${rows.length}</div>
      <div class="kpi-sub">active sections</div>
    </div>`;

  // Backlog summary
  let report = [];
  rows.forEach(row => {
    const total    = row.vals.reduce((a,b)=>a+b, 0);
    const tt       = row.target * MONTHS.length;
    const variance = total - tt;
    const pct      = Math.round(total / tt * 100);
    if (pct < 100) {
      let lacking = [];
      row.vals.forEach((v, mi) => {
        const vv = v - row.target;
        if (vv < 0) lacking.push(`the month of ${MONTH_FULL[mi]} (${Math.abs(vv)})`);
      });
      let msg = `<strong>${row.name}</strong> is lacking <strong>${Math.abs(variance)}</strong> kaizen`;
      if (lacking.length) msg += ` &mdash; backlog coming from ${lacking.join(", ")}`;
      report.push(`<div class="summary-item">${msg}</div>`);
    }
  });
  document.getElementById("summaryBox").innerHTML = report.length
    ? report.join("")
    : `<div class="all-ok">🎉 All sections achieved their target &mdash; great work!</div>`;

}

/* ── Add / Remove ── */
function addRow() {
  rows.push({ name: "New section", target: 4, vals: [0,0,0,0,0] });
  buildRows();
  refresh();
}

function removeRow(ri) {
  if (rows.length <= 1) return alert("At least one section is required.");
  rows.splice(ri, 1);
  buildRows();
  refresh();
}

/* ── Export CSV ── */
function exportCSV() {
  const header = ["Section","Target/Mo",...MONTHS,"Total","Target Total","Variance","Attainment%"];
  const dataRows = rows.map(r => {
    const total = r.vals.reduce((a,b)=>a+b,0);
    const tt    = r.target * MONTHS.length;
    return [r.name, r.target, ...r.vals, total, tt, total-tt, Math.round(total/tt*100)+"%"];
  });
  const csv = [header, ...dataRows].map(r => r.join(",")).join("\n");
  const a   = document.createElement("a");
  a.href    = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "kaizen-monitor-cy2026.csv";
  a.click();
}

/* ── Init ── */
buildRows();
refresh();
</script>
</body>
</html>
